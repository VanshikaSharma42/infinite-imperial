<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />

    <!-- Title Tag -->
    <title>Infinte Imperiel</title>

    <!-- Mobile Viewport Code -->
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <!-- Seach Engine Cache Prevent Code -->
    <meta name="robots" content="noindex, nofollow" />
    <meta name="format-detection" content="telephone=no">
    <!-- Attched Stylesheets -->
    <link rel="stylesheet" href="assets/stylesheets/theme.css" type="text/css" />

</head>

<body>

    <!-- \* Outer *\ -->
    <div id="outer">

        <!-- \* Header *\ -->
        <header class="header position-fixed start-0 end-0">
            <div class="container">
                <nav class="navbar navbar-expand-lg gap-2 justify-content-end justify-content-lg-between">
                    <div class="header__sitelogo me-auto">
                        <a href="index.html"> <img loading="lazy" src="assets/images/logo.png" alt=""> </a>
                    </div>
                    <a href="index.html" class="btn btn-primary--outline ">Back To Home </a>
                </nav>
            </div>
        </header>
        <!-- /* Header */ -->

        <!-- \* content Area *\ -->
        <main id="contentArea" role="main">
            <div class="registerPage" id="banner">
                <div class="container">
                    <div class="registerPage__wrapper ">
                        <h2 class="heading">Create Your Account</h2>
                        <p class="desc">Join Infinite Imperial Ventures and unlock access to Dubai's most exclusive real estate listings, partnerships, and investment tools — all from one powerful platform.</p>
                       <div class="form">
                           <form action="" class="row">
                            <div class="col-md-12">
                                <div class="form__formGroup">
                                    <label for="" class="form-label">Select Your Role</label>
                                    <select for="" class="custom-select">
                                        <option value="">Choose your account type</option>
                                        <option value="">1</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form__formGroup">
                                    <label for="" class="form-label">First Name</label>
                                    <input type="text" name="firstName" class="form-control" placeholder="Enter your First name">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form__formGroup">
                                    <label for="" class="form-label">Last Name</label>
                                    <input type="text" name="lastName" class="form-control" placeholder="Enter your last name">
                                </div>
                            </div>

                            <div class="col-md-12">
                                <div class="form__formGroup">
                                    <label for="" class="form-label">Email Address</label>
                                    <input type="email" name="email" class="form-control" placeholder="Provide a valid email for verification">
                                </div>
                            </div>
                            <div class="col-md-12">
                                <div class="form__formGroup">
                                    <label for="" class="form-label">Password</label>
                                    <input type="password" name="password" class="form-control"  placeholder="Create a strong password">
                                </div>
                            </div>
                            <div class="col-md-12">
                                <div class="form__formGroup">
                                    <label for="" class="form-label">Confirm Password</label>
                                    <input type="password" name="password" class="form-control" placeholder="Re-enter your password to confirm">
                                </div>
                            </div>
                            <button class="btn btn-primary">Sign Up</button>
                        </form>
                        <div class="form__registerNow">
                            <h6 class="ttl">Already have an account ?</h6>
                            <a href="login.html" class="link"> Sign In</a>
                        </div>

                       </div>
                     
                    </div>
                </div>
            </div>
        </main>

        <!-- /* Content Area */ -->

        <a href="#" class="scrollup" contenteditable="false" style="cursor: pointer; display: inline;"><svg width="16"
                height="27" viewBox="0 0 16 27" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path
                    d="M7.29289 26.7071C7.68342 27.0976 8.31658 27.0976 8.70711 26.7071L15.0711 20.3431C15.4616 19.9526 15.4616 19.3195 15.0711 18.9289C14.6805 18.5384 14.0474 18.5384 13.6569 18.9289L8 24.5858L2.34315 18.9289C1.95262 18.5384 1.31946 18.5384 0.928932 18.9289C0.538408 19.3195 0.538408 19.9526 0.928932 20.3431L7.29289 26.7071ZM7 0L7 26H9L9 0L7 0Z"
                    fill="white"></path>
            </svg></a>
    </div>
    <!-- /* Outer */ -->

    <!-- Attched assets/javascripts -->
    <script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/javascripts/aos.js"></script>
    <script src="assets/javascripts/slick.js"></script>
    <script src="assets/javascripts/global.js"></script>

</body>

</html>
